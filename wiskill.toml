[paths]
pages = "data/pages"
index = "data/index"

[search]
mode = "lexical"          # lexical | semantic | hybrid
lexical_engine = "core"  # core | bm25
alpha = 0.5
fusion = "rrf"           # rrf | linear | dbsf

[semantic]
provider = "sentence-transformers"
model = "all-MiniLM-L6-v2"
vector_store = "numpy"

[auth]
users_file = "data/users.json"
apikeys_file = "data/apikeys.json"
session_secret_env = "WISKILL_SECRET"
session_ttl_hours = 168

[web]
# Let anyone view + search without logging in (editing still needs an account).
# Set false to require login for everything.
public_read = true
