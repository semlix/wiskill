{% extends "base.html" %}
{% block title %}Edit {{ slug }}{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
{% endblock %}
{% block content %}
<div class="breadcrumb"><a href="/">Home</a> <span class="sep">/</span> {{ 'Editing' if page else 'New page' }}</div>
<form action="/{{ slug }}" method="post" class="edit">
  <div class="editor-head">
    <div class="field title">
      <label for="title">Title</label>
      <input id="title" name="title" value="{{ page.title if page else slug.split('/')|last }}" placeholder="Page title">
    </div>
    <div class="field">
      <label for="tags">Tags <span style="text-transform:none;letter-spacing:0">(comma-separated)</span></label>
      <input id="tags" name="tags" value="{{ page.tags|join(', ') if page else '' }}" placeholder="e.g. auth, notes">
    </div>
    <div class="field">
      <label for="body">Content <span style="text-transform:none;letter-spacing:0">— slug <code>{{ slug }}</code></span></label>
      <textarea id="body" name="body" rows="18">{{ page.body if page else '' }}</textarea>
    </div>
  </div>
  <div class="editor-actions">
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn" href="/{{ slug }}">Cancel</a>
  </div>
</form>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
  // Progressive enhancement: if the CDN is unreachable, the plain <textarea>
  // still works and the form still submits `body`.
  if (window.EasyMDE) {
    // EasyMDE's preview only knows plain Markdown, not our [[wikilink]]
    // syntax — without this, Preview/side-by-side shows the raw brackets
    // instead of the link the saved page would actually render. Existing
    // slugs come from the sidebar tree already in the DOM (every real page
    // this user can see has a `.tree-leaf[href]` there), same source of
    // truth the server uses to decide missing vs. existing.
    var existingSlugs = new Set(
      Array.from(document.querySelectorAll(".tree-leaf[href]"))
        .map(function (a) { return a.getAttribute("href").replace(/^\//, ""); })
    );
    var WIKILINK_RE = /\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g;
    function renderWikilinks(html) {
      return html.replace(WIKILINK_RE, function (_, slug, label) {
        slug = slug.trim();
        var text = (label || slug).trim();
        var exists = existingSlugs.has(slug);
        var href = exists ? "/" + slug : "/" + slug + "/edit";
        var cls = exists ? "wikilink" : "wikilink missing";
        return '<a href="' + href + '" class="' + cls + '">' + text + "</a>";
      });
    }
    new EasyMDE({
      element: document.getElementById("body"),
      spellChecker: false,
      autofocus: false,
      placeholder: "Write in Markdown… use [[slug]] to link pages.",
      status: ["lines", "words"],
      toolbar: ["bold", "italic", "heading", "|", "quote", "unordered-list",
                "ordered-list", "code", "|", "link", "table", "horizontal-rule",
                "|", "preview", "side-by-side", "fullscreen", "|", "guide"],
      previewRender: function (plainText) {
        return renderWikilinks(this.markdown(plainText));
      },
    });
  }
</script>
{% endblock %}
