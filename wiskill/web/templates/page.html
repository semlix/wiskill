{% extends "base.html" %}
{% block title %}{{ page.title }}{% endblock %}
{% block content %}
<article>
  <h1>{{ page.title }}</h1>
  {% if page.tags %}<p class="tags">{% for t in page.tags %}<span>{{ t }}</span>{% endfor %}</p>{% endif %}
  <div class="body">{{ html|safe }}</div>
</article>
<p class="actions"><a href="/{{ slug }}/edit">editar</a>
  <form action="/{{ slug }}/delete" method="post" onsubmit="return confirm('¿Borrar?')"><button>borrar</button></form>
</p>
{% endblock %}
