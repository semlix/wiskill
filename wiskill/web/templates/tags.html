{% extends "base.html" %}
{% block title %}Tags{% endblock %}
{% block content %}
<div class="breadcrumb"><a href="/">Home</a> <span class="sep">/</span> Tags</div>
<h1 class="page-title">Tags</h1>
<p class="meta">{{ tags|length }} tag{{ '' if tags|length == 1 else 's' }}</p>
<hr class="rule">
{% if tags %}
<div class="tag-cloud">
  {% for tag, count, tier in tags %}
  <a class="tag-cloud-item tier-{{ tier }}" href="/tags/{{ tag }}" title="{{ count }} page{{ '' if count == 1 else 's' }}">#{{ tag }}</a>
  {% endfor %}
</div>
{% else %}
<p class="empty">No tags yet.</p>
{% endif %}
{% endblock %}
